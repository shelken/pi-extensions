  <text x="34" y="151" class="green">packages/ui</text>
  <text x="130" y="151" class="dim"> — </text>
  <text x="148" y="151" class="muted">/Users/me/monorepo/packages/ui</text>
  <text x="430" y="151" class="dim">(</text>
  <text x="438" y="151" class="yellow">workspace member, has AGENTS.md, has skills</text>
