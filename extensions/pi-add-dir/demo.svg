  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="14" y="655" class="section">▎ llm tools</text>

  <text x="14" y="677" class="accent bold">❯</text>
  <text x="28" y="677" class="text"> I need the auth service's API types</text>

  <text x="14" y="705" class="dim">  ┌ </text>
  <text x="40" y="705" class="accent bold">add_directory </text>
