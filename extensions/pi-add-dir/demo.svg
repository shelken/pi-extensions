  <text x="34" y="171" class="text">packages/shared</text>
  <text x="163" y="171" class="dim"> — </text>
  <text x="181" y="171" class="dim">(</text>
  <text x="189" y="171" class="yellow">pnpm workspace, has CLAUDE.md</text>
  <text x="463" y="171" class="dim">)</text>

  <text x="34" y="191" class="text">../auth-service</text>
  <text x="163" y="191" class="dim"> — </text>
  <text x="181" y="191" class="dim">(</text>
  <text x="189" y="191" class="yellow">Docker Compose service</text>
  <text x="380" y="191" class="dim">)</text>

