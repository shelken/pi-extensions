name: Publish

# Changesets Release PR 模式：
# 1. push 到 main 且有待发布的 changeset → 自动开 "chore(release)" PR（含 version bump + CHANGELOG）
# 2. 该 PR 被 merge 后再次 push → 无待发布 changeset → 执行 changeset publish（发 npm + 打 tag + 建 GitHub Release）
# 详细流程见 docs/versioning.md
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance 发布
      contents: write   # 打 tag + 建 GitHub Release
      pull-requests: write  # 自动开 release PR
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - uses: changesets/action@v1.9.0
        with:
          publish: bunx changeset publish
          version: bunx changeset version
          commit: "chore(release): 版本发布"
          title: "chore(release): 版本发布"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
