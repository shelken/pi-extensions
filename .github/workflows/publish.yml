name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - name: Publish workspace packages
        run: |
          for pkg in extensions/*/; do
            name=$(jq -r '.name // empty' "$pkg/package.json")
            private=$(jq -r '.private // false' "$pkg/package.json")

            if [ -z "$name" ] || [ "$private" = "true" ]; then
              echo "Skipping $pkg (no name or private)"
              continue
            fi

            current=$(jq -r '.version' "$pkg/package.json")
            published=$(npm view "$name" version 2>/dev/null || echo "none")

            if [ "$current" = "$published" ]; then
              echo "Skipping $name@$current (already published)"
              continue
            fi

            echo "Publishing $name@$current..."
            (cd "$pkg" && npm publish --access public)
          done
