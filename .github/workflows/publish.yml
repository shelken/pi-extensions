name: Publish

# Changesets Release PR 模式：
# 1. push 到 main 且有待发布的 changeset → 自动开 "chore(release)" PR（含 version bump + CHANGELOG）
# 2. 该 PR 被 merge 后再次 push → 无待发布 changeset → 执行 changeset publish（发 npm + 打 tag + 建 GitHub Release）
# 详细流程见 docs/versioning.md
on:
  push:
    branches: [main]
    paths:
      - .changeset/**
      - extensions/*/package.json
      - extensions/*/CHANGELOG.md
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm Trusted Publishing OIDC
      contents: write   # 打 tag + 建 GitHub Release
      pull-requests: write  # 自动开 release PR
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: 提取待发布包名
        id: packages
        run: |
          NAMES=$(sed -n 's/^"\([^"]*\)".*/\1/p' .changeset/*.md | sort -u | tr '\n' ' ')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - uses: changesets/action@v1.9.0
        id: changesets
        with:
          publish: bunx changeset publish
          version: bunx changeset version
          commit: "chore(release): 版本发布"
          title: "chore(release): 版本发布"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 给 release PR 加标签
        if: steps.changesets.outputs.pullRequestNumber != ''
        run: |
          for pkg in ${{ steps.packages.outputs.names }}; do
            gh label create "release:$pkg" 2>/dev/null || true
            gh pr edit "${{ steps.changesets.outputs.pullRequestNumber }}" --add-label "release:$pkg"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
